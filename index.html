<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do Application</title>
    <link rel="icon" href="images/Logo Circle.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="todo">
        <p id="header-title">To-do List</p>
        <div id="contents">
            <div id="todo-filter">
                <input class="checkbox" type="checkbox" id="completed-box" checked="true">Completed
                <input class="checkbox" type="checkbox" id="active-box" checked="true">Active
            </div>
            <div id="todo-list"></div>
            <div id="todo-insert">
                <input id="todo-text"></input>
                <button class="button" id="todo-submit">▶</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
